<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>✨ 关于 ToriMusic.</title>
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Remix Icons -->
  <link href="assets/fonts/remixicon/remixicon.css" rel="stylesheet">
  
  <style>
    :root {
      --accent-r: 61;
      --accent-g: 90;
      --accent-b: 254;
      --accent: rgb(var(--accent-r), var(--accent-g), var(--accent-b));
      --bg-base: #050507;
      --text-main: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --glass-bg: rgba(20, 20, 25, 0.4);
      --glass-border: rgba(255, 255, 255, 0.08);
      --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.2);
      --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0; background-color: var(--bg-base); color: var(--text-main);
      min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased;
      display: flex; align-items: center; justify-content: center;
    }

    /* --- Aurora Fluid Background --- */
    .aurora-bg { position: fixed; inset: 0; z-index: -2; overflow: hidden; background: var(--bg-base); }
    .aurora-orb {
      position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.5;
      animation: floatOrb 20s infinite alternate var(--ease-smooth);
      will-change: transform;
    }
    .orb-1 {
      width: 55vw; height: 55vw; top: -10vw; left: -10vw;
      background: radial-gradient(circle, rgba(var(--accent-r), var(--accent-g), var(--accent-b), 0.4) 0%, transparent 70%);
    }
    .orb-2 {
      width: 45vw; height: 45vw; bottom: -10vw; right: -5vw;
      background: radial-gradient(circle, rgba(167, 139, 250, 0.25) 0%, transparent 70%);
      animation-delay: -5s;
    }

    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(8vw, 12vh) scale(1.15); }
      100% { transform: translate(-5vw, -8vh) scale(0.9); }
    }

    .noise-overlay {
      position: fixed; inset: 0;
      background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
      opacity: 0.04; z-index: -1; pointer-events: none;
    }

    .profile-card {
      background: var(--glass-bg); backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 32px; padding: 40px;
      max-width: 500px; width: 90%;
      text-align: center;
      box-shadow: 0 24px 40px -10px rgba(0, 0, 0, 0.8), 0 0 40px rgba(var(--accent-r), var(--accent-g), var(--accent-b), 0.1);
      animation: fadeIn 0.6s var(--ease-smooth) forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .profile-logo {
      font-size: 3rem; color: var(--accent);
      text-shadow: 0 0 20px rgba(var(--accent-r), var(--accent-g), var(--accent-b), 0.6);
      margin-bottom: 20px;
      animation: spinDisc 10s linear infinite;
      display: inline-block;
    }

    @keyframes spinDisc {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 2.2rem; font-weight: 800; margin: 0 0 10px;
      letter-spacing: -0.02em;
    }

    p {
      color: var(--text-secondary); font-size: 1rem; line-height: 1.6;
      margin: 0 0 24px;
    }

    .features-list {
      text-align: left; margin: 0 auto 30px; max-width: 350px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 20px; padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .feature-item {
      display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
      font-size: 0.95rem; font-weight: 500;
    }

    .feature-item:last-child { margin-bottom: 0; }

    .feature-item i {
      color: var(--accent); font-size: 1.2rem;
    }

    .btn-back {
      background: var(--text-main); color: #000; border: none; padding: 14px 32px; border-radius: 100px;
      font-size: 1rem; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
      transition: all 0.3s var(--ease-spring); text-decoration: none;
    }
    .btn-back:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.2); }
  </style>
</head>
<body>

  <!-- Dynamic Aurora Background -->
  <div class="aurora-bg">
    <div class="aurora-orb orb-1"></div>
    <div class="aurora-orb orb-2"></div>
  </div>
  <div class="noise-overlay"></div>

  <!-- Profile Card -->
  <div class="profile-card">
    <div class="profile-logo"><i class="ri-disc-fill"></i></div>
    <h1>ToriMusic.</h1>
    <p>听见世界的颜色 — 简雅至美、沉浸感十足的在线流媒体和歌词同步下载平台。</p>
    
    <div class="features-list">
      <div class="feature-item">
        <i class="ri-shining-line"></i>
        <span>多引擎星空搜索支持</span>
      </div>
      <div class="feature-item">
        <i class="ri-music-2-line"></i>
        <span>超高品质无损音质试听</span>
      </div>
      <div class="feature-item">
        <i class="ri-file-list-3-line"></i>
        <span>极光歌词同步，唱享不停</span>
      </div>
      <div class="feature-item">
        <i class="ri-download-cloud-line"></i>
        <span>批量资源高速极速下载</span>
      </div>
    </div>

    <a href="index.html" class="btn-back">
      <i class="ri-arrow-left-line"></i> 返回探索
    </a>
  </div>

</body>
</html>
